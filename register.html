<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: {
              bg: '#090A14',
              card: '#111222',
              border: '#1C1E2E',
              muted: '#2A2D42',
            },
            primary: '#DF6B33',
            primaryHover: '#C25A28',
          },
          fontFamily: {
            poppins: ['Poppins', 'sans-serif'],
            inter: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #090A14;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #6B7280;
      pointer-events: none;
    }
    .social-btn:hover .social-icon {
      transform: scale(1.1);
    }
    .social-btn:hover {
      border-color: #DF6B33;
    }
    .social-btn:hover .social-text {
      color: #DF6B33;
    }
    .input-error {
      border-color: #EF4444 !important;
    }
    .input-error:focus {
      border-color: #EF4444 !important;
      box-shadow: 0 0 0 1px #EF4444 !important;
    }
    .error-msg {
      display: none;
    }
    .error-msg.show {
      display: flex;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-inter">

  <div class="w-full max-w-md">

    <!-- Logo / Brand -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/10 mb-4">
        <i data-lucide="shield-check" class="w-8 h-8 text-primary"></i>
      </div>
      <h1 class="font-poppins font-extrabold text-3xl text-white mb-2">Create Account</h1>
      <p class="font-inter text-gray-400 text-sm">Join us and start your journey</p>
    </div>

    <!-- Card -->
    <form id="registerForm" novalidate class="bg-dark-card rounded-3xl border border-dark-border p-8 shadow-2xl">

      <!-- Full Name -->
      <div class="mb-4">
        <label class="block font-poppins font-semibold text-sm text-gray-300 mb-2" for="fullname">Full Name <span class="text-red-400">*</span></label>
        <div class="relative">
          <span class="input-icon">
            <i data-lucide="user" class="w-5 h-5"></i>
          </span>
          <input
            id="fullname"
            type="text"
            placeholder="John Doe"
            autocomplete="name"
            class="w-full bg-dark-muted border border-dark-border rounded-xl py-3.5 pl-12 pr-4 text-gray-200 placeholder-gray-500 font-inter text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200"
          />
        </div>
        <div id="fullnameError" class="error-msg items-center gap-1.5 mt-2 pl-1">
          <i data-lucide="alert-circle" class="w-3.5 h-3.5 text-red-400 flex-shrink-0"></i>
          <span class="font-inter text-xs text-red-400"></span>
        </div>
      </div>

      <!-- Email -->
      <div class="mb-4">
        <label class="block font-poppins font-semibold text-sm text-gray-300 mb-2" for="email">Email Address <span class="text-red-400">*</span></label>
        <div class="relative">
          <span class="input-icon">
            <i data-lucide="mail" class="w-5 h-5"></i>
          </span>
          <input
            id="email"
            type="email"
            placeholder="you@example.com"
            autocomplete="email"
            class="w-full bg-dark-muted border border-dark-border rounded-xl py-3.5 pl-12 pr-4 text-gray-200 placeholder-gray-500 font-inter text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200"
          />
        </div>
        <div id="emailError" class="error-msg items-center gap-1.5 mt-2 pl-1">
          <i data-lucide="alert-circle" class="w-3.5 h-3.5 text-red-400 flex-shrink-0"></i>
          <span class="font-inter text-xs text-red-400"></span>
        </div>
      </div>

      <!-- Phone -->
      <div class="mb-4">
        <label class="block font-poppins font-semibold text-sm text-gray-300 mb-2" for="phone">Phone Number <span class="text-gray-500 font-normal">(optional)</span></label>
        <div class="relative">
          <span class="input-icon">
            <i data-lucide="phone" class="w-5 h-5"></i>
          </span>
          <input
            id="phone"
            type="tel"
            placeholder="0123456789"
            autocomplete="tel"
            class="w-full bg-dark-muted border border-dark-border rounded-xl py-3.5 pl-12 pr-4 text-gray-200 placeholder-gray-500 font-inter text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200"
          />
        </div>
        <div id="phoneError" class="error-msg items-center gap-1.5 mt-2 pl-1">
          <i data-lucide="alert-circle" class="w-3.5 h-3.5 text-red-400 flex-shrink-0"></i>
          <span class="font-inter text-xs text-red-400"></span>
        </div>
      </div>

      <!-- Gender -->
      <div class="mb-4">
        <label class="block font-poppins font-semibold text-sm text-gray-300 mb-2">Gender <span class="text-gray-500 font-normal">(optional)</span></label>
        <div class="flex gap-4 mt-1">
          <label class="flex items-center gap-2 cursor-pointer group">
            <input type="radio" name="gender" value="male" class="sr-only peer/male">
            <div class="w-5 h-5 rounded-full border-2 border-dark-border bg-dark-muted peer-checked/male:border-primary peer-checked/male:bg-primary/20 flex items-center justify-center transition-all duration-200">
              <div class="w-2 h-2 rounded-full bg-primary opacity-0 peer-checked/male:opacity-100 transition-opacity"></div>
            </div>
            <span class="font-inter text-sm text-gray-400 group-hover:text-gray-300 transition-colors select-none">Male</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer group">
            <input type="radio" name="gender" value="female" class="sr-only peer/female">
            <div class="w-5 h-5 rounded-full border-2 border-dark-border bg-dark-muted peer-checked/female:border-primary peer-checked/female:bg-primary/20 flex items-center justify-center transition-all duration-200">
              <div class="w-2 h-2 rounded-full bg-primary opacity-0 peer-checked/female:opacity-100 transition-opacity"></div>
            </div>
            <span class="font-inter text-sm text-gray-400 group-hover:text-gray-300 transition-colors select-none">Female</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer group">
            <input type="radio" name="gender" value="other" class="sr-only peer/other">
            <div class="w-5 h-5 rounded-full border-2 border-dark-border bg-dark-muted peer-checked/other:border-primary peer-checked/other:bg-primary/20 flex items-center justify-center transition-all duration-200">
              <div class="w-2 h-2 rounded-full bg-primary opacity-0 peer-checked/other:opacity-100 transition-opacity"></div>
            </div>
            <span class="font-inter text-sm text-gray-400 group-hover:text-gray-300 transition-colors select-none">Other</span>
          </label>
        </div>
      </div>

      <!-- Address -->
      <div class="mb-4">
        <label class="block font-poppins font-semibold text-sm text-gray-300 mb-2" for="address">Address <span class="text-gray-500 font-normal">(optional)</span></label>
        <div class="relative">
          <span class="input-icon">
            <i data-lucide="map-pin" class="w-5 h-5"></i>
          </span>
          <input
            id="address"
            type="text"
            placeholder="123 Main St, City"
            autocomplete="street-address"
            class="w-full bg-dark-muted border border-dark-border rounded-xl py-3.5 pl-12 pr-4 text-gray-200 placeholder-gray-500 font-inter text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="block font-poppins font-semibold text-sm text-gray-300 mb-2" for="password">Password <span class="text-red-400">*</span></label>
        <div class="relative">
          <span class="input-icon">
            <i data-lucide="lock" class="w-5 h-5"></i>
          </span>
          <input
            id="password"
            type="password"
            placeholder="Create a strong password"
            autocomplete="new-password"
            class="w-full bg-dark-muted border border-dark-border rounded-xl py-3.5 pl-12 pr-12 text-gray-200 placeholder-gray-500 font-inter text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200"
          />
          <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors">
            <i data-lucide="eye" class="w-5 h-5" id="eyeIcon"></i>
          </button>
        </div>
        <div id="passwordError" class="error-msg items-center gap-1.5 mt-2 pl-1">
          <i data-lucide="alert-circle" class="w-3.5 h-3.5 text-red-400 flex-shrink-0"></i>
          <span class="font-inter text-xs text-red-400"></span>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="mb-6">
        <label class="block font-poppins font-semibold text-sm text-gray-300 mb-2" for="confirmPassword">Confirm Password <span class="text-red-400">*</span></label>
        <div class="relative">
          <span class="input-icon">
            <i data-lucide="lock" class="w-5 h-5"></i>
          </span>
          <input
            id="confirmPassword"
            type="password"
            placeholder="Re-enter your password"
            autocomplete="new-password"
            class="w-full bg-dark-muted border border-dark-border rounded-xl py-3.5 pl-12 pr-12 text-gray-200 placeholder-gray-500 font-inter text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200"
          />
          <button type="button" id="toggleConfirmPassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors">
            <i data-lucide="eye" class="w-5 h-5" id="eyeIconConfirm"></i>
          </button>
        </div>
        <div id="confirmPasswordError" class="error-msg items-center gap-1.5 mt-2 pl-1">
          <i data-lucide="alert-circle" class="w-3.5 h-3.5 text-red-400 flex-shrink-0"></i>
          <span class="font-inter text-xs text-red-400"></span>
        </div>
      </div>

      <!-- Terms -->
      <div class="mb-6">
        <label class="flex items-start gap-2.5 cursor-pointer group">
          <div class="relative mt-0.5">
            <input type="checkbox" class="sr-only peer" id="terms">
            <div class="w-5 h-5 rounded-md border-2 border-dark-border bg-dark-muted peer-checked:bg-primary peer-checked:border-primary peer-focus:ring-1 peer-focus:ring-primary transition-all duration-200 peer-hover:border-primary/70 flex items-center justify-center">
              <i data-lucide="check" class="w-3 h-3 text-white opacity-0 peer-checked:opacity-100 transition-opacity"></i>
            </div>
          </div>
          <span class="font-inter text-sm text-gray-400 group-hover:text-gray-300 transition-colors select-none leading-snug">
            I agree to the <a href="#" class="text-primary hover:text-primaryHover font-medium transition-colors">Terms of Service</a> and <a href="#" class="text-primary hover:text-primaryHover font-medium transition-colors">Privacy Policy</a>
          </span>
        </label>
        <div id="termsError" class="error-msg items-center gap-1.5 mt-2 pl-1">
          <i data-lucide="alert-circle" class="w-3.5 h-3.5 text-red-400 flex-shrink-0"></i>
          <span class="font-inter text-xs text-red-400"></span>
        </div>
      </div>

      <!-- Register Button -->
      <button
        type="submit"
        class="w-full bg-primary hover:bg-primaryHover font-poppins font-bold text-white text-base py-3.5 rounded-xl transition-all duration-200 hover:shadow-lg hover:shadow-primary/25 active:scale-[0.98] flex items-center justify-center gap-2"
      >
        Create Account
        <i data-lucide="user-plus" class="w-5 h-5"></i>
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-4 my-6">
        <div class="flex-1 h-px bg-dark-border"></div>
        <span class="font-inter text-xs text-gray-500 uppercase tracking-widest">or sign up with</span>
        <div class="flex-1 h-px bg-dark-border"></div>
      </div>

      <!-- Social Buttons -->
      <div class="grid grid-cols-3 gap-3">

        <!-- Google -->
        <button type="button" class="social-btn flex flex-col items-center justify-center py-3.5 rounded-xl border border-dark-border bg-dark-muted hover:bg-dark-border/50 transition-all duration-200 cursor-pointer">
          <div class="social-icon transition-transform duration-200 mb-1.5">
            <svg class="w-6 h-6" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
          </div>
          <span class="social-text font-inter text-xs text-gray-400 transition-colors duration-200 font-medium">Google</span>
        </button>

        <!-- GitHub -->
        <button type="button" class="social-btn flex flex-col items-center justify-center py-3.5 rounded-xl border border-dark-border bg-dark-muted hover:bg-dark-border/50 transition-all duration-200 cursor-pointer">
          <div class="social-icon transition-transform duration-200 mb-1.5">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="white">
              <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
            </svg>
          </div>
          <span class="social-text font-inter text-xs text-gray-400 transition-colors duration-200 font-medium">GitHub</span>
        </button>

        <!-- Facebook -->
        <button type="button" class="social-btn flex flex-col items-center justify-center py-3.5 rounded-xl border border-dark-border bg-dark-muted hover:bg-dark-border/50 transition-all duration-200 cursor-pointer">
          <div class="social-icon transition-transform duration-200 mb-1.5">
            <svg class="w-6 h-6" viewBox="0 0 24 24">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/>
            </svg>
          </div>
          <span class="social-text font-inter text-xs text-gray-400 transition-colors duration-200 font-medium">Facebook</span>
        </button>
      </div>

    </form>

    <!-- Back to Login -->
    <p class="text-center mt-8 font-inter text-sm text-gray-500">
      Already have an account?
      <a href="login.html" class="text-primary hover:text-primaryHover font-semibold transition-colors">Sign in</a>
    </p>

  </div>

  <script>
    // Init Lucide icons
    lucide.createIcons();

    const fullnameInput  = document.getElementById('fullname');
    const emailInput     = document.getElementById('email');
    const phoneInput    = document.getElementById('phone');
    const passwordInput = document.getElementById('password');
    const confirmInput  = document.getElementById('confirmPassword');
    const termsInput     = document.getElementById('terms');
    const registerForm  = document.getElementById('registerForm');

    // --- Toggle password ---
    function makeToggle(inputId, iconId) {
      const btn  = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      btn.addEventListener('click', () => {
        const isPassword = icon.getAttribute('data-lucide') === 'eye';
        icon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
        const target = document.getElementById(inputId.replace('toggle', '').toLowerCase() === 'toggleconfirmpassword' ? 'confirmPassword' : 'password');
        // find the matching input by icon id
        const inputs = document.querySelectorAll('input[type="password"]');
        // Use the iconId to find which input
        let targetInput;
        if (iconId === 'eyeIcon') targetInput = document.getElementById('password');
        else targetInput = document.getElementById('confirmPassword');
        targetInput.type = isPassword ? 'text' : 'password';
        lucide.createIcons();
      });
    }
    makeToggle('togglePassword', 'eyeIcon');
    makeToggle('toggleConfirmPassword', 'eyeIconConfirm');

    // Custom checkbox
    termsInput.addEventListener('change', function() {
      const icon = this.parentElement.querySelector('[data-lucide="check"]');
      if (icon) icon.style.opacity = this.checked ? '1' : '0';
      if (this.checked) clearError(termsInput, document.getElementById('termsError'));
    });

    // --- Validation helpers ---
    function showError(input, errorEl, message) {
      if (input) input.classList.add('input-error');
      errorEl.querySelector('span').textContent = message;
      errorEl.classList.add('show');
      lucide.createIcons();
    }

    function clearError(input, errorEl) {
      if (input) input.classList.remove('input-error');
      errorEl.classList.remove('show');
    }

    function isValidEmail(value) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value.trim());
    }

    function isValidPhone(value) {
      if (!value) return true; // optional
      return /^0[0-9]{9}$/.test(value.trim());
    }

    // --- Field validators ---
    function validateFullname() {
      const v = fullnameInput.value.trim();
      if (!v) { showError(fullnameInput, document.getElementById('fullnameError'), 'Full name is required'); return false; }
      clearError(fullnameInput, document.getElementById('fullnameError')); return true;
    }

    function validateEmail() {
      const v = emailInput.value.trim();
      if (!v)       { showError(emailInput, document.getElementById('emailError'), 'Email is required'); return false; }
      if (!isValidEmail(v)) { showError(emailInput, document.getElementById('emailError'), 'Invalid email address'); return false; }
      clearError(emailInput, document.getElementById('emailError')); return true;
    }

    function validatePhone() {
      const v = phoneInput.value.trim();
      if (v && !isValidPhone(v)) { showError(phoneInput, document.getElementById('phoneError'), 'Phone must be 10 digits starting with 0'); return false; }
      clearError(phoneInput, document.getElementById('phoneError')); return true;
    }

    function validatePassword() {
      const v = passwordInput.value;
      if (!v)      { showError(passwordInput, document.getElementById('passwordError'), 'Password is required'); return false; }
      if (v.length < 6) { showError(passwordInput, document.getElementById('passwordError'), 'Password must be at least 6 characters'); return false; }
      clearError(passwordInput, document.getElementById('passwordError')); return true;
    }

    function validateConfirmPassword() {
      const v = confirmInput.value;
      if (!v)      { showError(confirmInput, document.getElementById('confirmPasswordError'), 'Please confirm your password'); return false; }
      if (v !== passwordInput.value) { showError(confirmInput, document.getElementById('confirmPasswordError'), 'Passwords do not match'); return false; }
      clearError(confirmInput, document.getElementById('confirmPasswordError')); return true;
    }

    function validateTerms() {
      if (!termsInput.checked) { showError(null, document.getElementById('termsError'), 'You must agree to the terms and privacy policy'); return false; }
      clearError(null, document.getElementById('termsError')); return true;
    }

    // --- Real-time clear on input ---
    fullnameInput.addEventListener('input', () => { if (fullnameInput.classList.contains('input-error')) validateFullname(); });
    emailInput.addEventListener('input',    () => { if (emailInput.classList.contains('input-error'))    validateEmail(); });
    phoneInput.addEventListener('input',    () => { if (phoneInput.classList.contains('input-error'))    validatePhone(); });
    passwordInput.addEventListener('input', () => {
      if (passwordInput.classList.contains('input-error')) validatePassword();
      if (confirmInput.value && confirmInput.classList.contains('input-error')) validateConfirmPassword();
    });
    confirmInput.addEventListener('input', () => { if (confirmInput.classList.contains('input-error')) validateConfirmPassword(); });

    // --- Blur validation ---
    fullnameInput.addEventListener('blur', validateFullname);
    emailInput.addEventListener('blur',    validateEmail);
    phoneInput.addEventListener('blur',    validatePhone);
    passwordInput.addEventListener('blur', validatePassword);
    confirmInput.addEventListener('blur',  validateConfirmPassword);

    // --- Form submit ---
    registerForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const ok = [
        validateFullname(),
        validateEmail(),
        validatePhone(),
        validatePassword(),
        validateConfirmPassword(),
        validateTerms(),
      ].every(Boolean);
      if (ok) {
        console.log('Register valid:', {
          fullname: fullnameInput.value,
          email:    emailInput.value,
          phone:    phoneInput.value,
          gender:   document.querySelector('input[name="gender"]:checked')?.value || '',
          address:  document.getElementById('address').value,
          password: '***',
        });
      }
    });
  </script>

</body>
</html>
